version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: chore
      include: scope
    groups:
      rust-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /example
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 10
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: chore
      include: scope
    groups:
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "eslint-config-next"]
      js-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 5
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: chore
      include: scope
